<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Degree</title>
</head>
<style>
    a{
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        padding: 0;
        text-decoration: none;
    }
    button{
        width: 100px;
        height: 50px;
    }
</style>
<body>
    <a href="degree.html" >
        <button id="btn" type="submit">Click Me !</button>
    </a>

    <script>
        const btn = document.getElementById("btn"); 
        btn.addEventListener('click', () =>{
            const name = prompt("Enter name and surname"); 
            if(name && name.trim() !== "") {
                // Store the name in localStorage
                localStorage.setItem("friendName", name.trim());

                // Go to degree page
                window.location.href = "degree.html";
            } else {
                alert("Please enter a valid name!");
            }
        })
    </script>
</body>
</html>
